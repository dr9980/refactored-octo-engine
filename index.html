<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2c3e50">
    <title>河北文旅 - 燕赵大地 魅力河北</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
        }

        img, video {
            max-width: 100%;
            display: block;
        }

        .navbar {
            background-color: #2c3e50;
            padding: 0.8rem 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0.8rem;
        }

        .logo {
            color: #fff;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 0.8rem;
            padding: 0;
            margin: 0;
            align-items: center;
        }

        .nav-links a,
        .dropbtn {
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s;
            background: none;
            border: none;
            font-size: 0.95rem;
            font-family: inherit;
            padding: 0.25rem 0.4rem;
            display: inline-block;
            white-space: nowrap;
        }

        .nav-links a:hover,
        .dropbtn:hover {
            color: #3498db;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            left: 0;
            top: calc(100% + 4px);
            background-color: #fff;
            min-width: 180px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
            z-index: 999;
        }

        .dropdown-content a {
            color: #2c3e50;
            padding: 0.8rem 1rem;
            text-decoration: none;
            display: block;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .dropdown-content a:hover {
            background: #f7f9fb;
            color: #3498db;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 1.2rem auto 2rem;
            padding: 0 1rem;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .hero {
            position: relative;
            width: 100%;
            min-height: 260px;
            height: 56vw;
            max-height: 420px;
            border-radius: 14px;
            overflow: hidden;
            background: #000;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            z-index: 0;
            background: #000;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 1;
            pointer-events: none;
        }

        .video-play-mask {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.08);
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .video-play-mask.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .video-play-btn {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.22);
            border: 2px solid rgba(255,255,255,0.8);
            color: white;
            font-size: 28px;
            backdrop-filter: blur(4px);
        }

        .hero-content {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 900px;
            padding: 0 1rem;
            margin: 0 auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hero-content h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            margin-bottom: 0.8rem;
            line-height: 1.25;
            text-align: center;
            width: 100%;
        }

        .hero-content p {
            font-size: clamp(0.95rem, 2.6vw, 1.2rem);
            text-align: center;
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
        }

        .ranking-wrapper,
        .page-card,
        .login-container,
        .attraction-detail {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
        }

        .ranking-wrapper {
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .ranking-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.2rem;
            background-color: #3498db;
            color: white;
            cursor: pointer;
        }

        .ranking-header-bar h2 {
            font-size: 1.15rem;
            line-height: 1.4;
        }

        .toggle-icon {
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .ranking-content {
            display: block;
            overflow-x: auto;
        }

        .ranking-header,
        .ranking-item {
            display: grid;
            grid-template-columns: 60px 2fr 1fr 1fr;
            gap: 0.5rem;
            align-items: center;
            min-width: 640px;
        }

        .ranking-header {
            background-color: #f4f4f4;
            padding: 0.8rem 1rem;
            font-weight: bold;
            border-bottom: 2px solid #ddd;
            font-size: 0.9rem;
        }

        .ranking-item {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
        }

        .ranking-item:hover {
            background-color: #f5f5f5;
        }

        .ranking-rank {
            font-weight: bold;
            font-size: 1rem;
        }

        .ranking-hot {
            color: #e67e22;
        }

        .featured-title {
            font-size: 1.6rem;
            margin: 2rem 0 1rem;
            text-align: center;
            color: #2c3e50;
        }

        .featured-grid,
        .hotel-grid,
        .food-grid-page {
            display: grid;
            gap: 1.2rem;
        }

        .featured-grid {
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        }

        .hotel-grid {
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            margin-top: 1.5rem;
        }

        .food-grid-page {
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        }

        .featured-card,
        .hotel-card,
        .food-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
        }

        .featured-card {
            cursor: pointer;
            transition: transform 0.3s;
        }

        .featured-card:hover,
        .hotel-card:hover {
            transform: translateY(-4px);
        }

        .featured-card img,
        .hotel-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .featured-card-content,
        .hotel-content,
        .food-card {
            padding: 1rem;
        }

        .page-card {
            padding: 1.3rem;
        }

        .page-card h2 {
            margin-bottom: 1rem;
            color: #2c3e50;
            font-size: 1.35rem;
            border-left: 4px solid #3498db;
            padding-left: 0.8rem;
        }

        .food-category {
            margin-bottom: 2rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
        }

        .food-category h3 {
            background-color: #f8f9fa;
            padding: 0.8rem;
            font-weight: bold;
            color: #e67e22;
            border-left: 4px solid #e67e22;
            margin-bottom: 1rem;
            border-radius: 6px;
        }

        .food-card h4 {
            font-size: 1.05rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .food-card p,
        .hotel-desc,
        .hotel-location {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
        }

        .hotel-card {
            cursor: pointer;
            transition: transform 0.25s;
        }

        .hotel-content h3 {
            margin-bottom: 0.35rem;
            color: #2c3e50;
        }

        .hotel-location {
            color: #e67e22;
            margin-bottom: 0.5rem;
        }

        .hotel-price {
            font-weight: bold;
            color: #2c3e50;
            margin: 0.5rem 0;
        }

        .attractions-checkbox {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .attractions-checkbox label {
            display: flex;
            align-items: flex-start;
            gap: 0.55rem;
            font-size: 0.92rem;
            cursor: pointer;
            background: #fafafa;
            padding: 0.75rem;
            border-radius: 10px;
            border: 1px solid #eee;
        }

        .preset-buttons {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }

        .preset-btn,
        .route-btn,
        .login-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 0.65rem 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.3s;
        }

        .route-btn,
        .login-btn {
            background-color: #3498db;
        }

        .preset-btn:hover {
            background-color: #d35400;
        }

        .route-btn:hover,
        .login-btn:hover {
            background-color: #2980b9;
        }

        .calc-result {
            background-color: #f4f4f4;
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0 1.2rem;
        }

        .calc-result p {
            margin: 0.35rem 0;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #3498db;
            cursor: pointer;
        }

        .detail-img {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
        }

        .detail-content {
            padding: 1.5rem;
        }

        .detail-content h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #2c3e50;
            line-height: 1.3;
        }

        .detail-content p,
        .detail-content li {
            line-height: 1.8;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
            background: #f4f4f4;
            padding: 1.2rem;
            border-radius: 8px;
        }

        .info-item {
            text-align: center;
        }

        .info-item h3 {
            margin-bottom: 0.5rem;
            color: #3498db;
        }

        .gallery {
            margin: 2rem 0;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
        }

        .gallery-grid img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }

        .login-container {
            max-width: 420px;
            margin: 2rem auto;
            padding: 1.8rem;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 1.2rem;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.45rem;
            color: #2c3e50;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 0.85rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .register-link {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #3498db;
            text-decoration: none;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1.4rem 1rem;
            margin-top: 2rem;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0.75rem 0.8rem;
            }

            .logo {
                text-align: center;
                width: 100%;
            }

            .nav-links {
                justify-content: center;
            }

            .container {
                padding: 0 0.8rem;
            }

            .hero {
                min-height: 240px;
                height: 62vw;
                max-height: 320px;
                border-radius: 12px;
            }

            .hero-content {
                padding: 0 0.9rem;
            }

            .hero-content h1 {
                font-size: 1.75rem;
                margin-bottom: 0.6rem;
            }

            .hero-content p {
                font-size: 0.95rem;
                line-height: 1.6;
            }

            .ranking-header-bar h2 {
                font-size: 1rem;
            }

            .page-card {
                padding: 1rem;
            }

            .page-card h2 {
                font-size: 1.2rem;
            }

            .featured-title {
                font-size: 1.35rem;
            }

            .detail-content {
                padding: 1rem;
            }

            .detail-content h1 {
                font-size: 1.6rem;
            }

            .attractions-checkbox,
            .food-grid-page,
            .hotel-grid,
            .featured-grid,
            .gallery-grid {
                grid-template-columns: 1fr;
            }

            .preset-buttons {
                flex-direction: column;
            }

            .preset-btn,
            .route-btn,
            .login-btn {
                width: 100%;
                border-radius: 10px;
            }
        }

        @media (max-width: 480px) {
            .hero {
                min-height: 220px;
                height: 68vw;
            }

            .hero-content h1 {
                font-size: 1.5rem;
            }

            .hero-content p {
                font-size: 0.9rem;
            }

            .video-play-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }

            .ranking-header-bar {
                padding: 0.85rem 1rem;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <div class="logo" data-page="home">河北文旅</div>
        <ul class="nav-links">
            <li><a data-page="home">首页</a></li>
            <li class="dropdown">
                <span class="dropbtn">🏆 排名榜 ▼</span>
                <div class="dropdown-content" id="rankingDropdown"></div>
            </li>
            <li><a data-page="food">🍜 美食</a></li>
            <li><a data-page="plan">🗺️ 旅游规划</a></li>
            <li><a data-page="hotel">🏨 住宿</a></li>
            <li><a data-page="login">登录</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div id="homePage" class="page active">
        <div class="hero">
            <video
                id="heroVideo"
                class="hero-video"
                autoplay
                muted
                loop
                playsinline
                webkit-playsinline
                x5-playsinline
                x5-video-player-type="h5"
                x5-video-player-fullscreen="false"
                preload="auto"
                poster="https://picsum.photos/id/1018/1200/600"
            >
                <source id="heroVideoSource" src="https://video.699pic.com/videos/ll/vt/hj/llvTHjFv6kLXD23debW4OyWZwJxa_10s.mp4" type="video/mp4">
            </video>

            <div class="video-play-mask" id="videoPlayMask">
                <div class="video-play-btn">▶</div>
            </div>

            <div class="hero-content">
                <h1>燕赵大地 魅力河北</h1>
                <p>探寻千年古韵，纵览太行风光，感受京津冀文旅新体验</p>
            </div>
        </div>

        <div class="ranking-wrapper">
            <div class="ranking-header-bar" id="rankingToggle">
                <h2>📊 河北热门景点排行榜（综合评分与客流量）</h2>
                <span class="toggle-icon" id="toggleIcon">▼</span>
            </div>
            <div class="ranking-content" id="rankingContent">
                <div class="ranking-list">
                    <div class="ranking-header">
                        <span>排名</span><span>景点名称</span><span>综合推荐指数</span><span>日均客流量</span>
                    </div>
                    <div id="rankingList"></div>
                </div>
            </div>
        </div>

        <div class="featured-title">✨ 游客最推荐的河北景点 ✨</div>
        <div class="featured-grid" id="featuredGrid"></div>
    </div>

    <div id="foodPage" class="page">
        <div class="page-card">
            <h2>🍜 燕赵美食荟萃</h2>
            <p style="margin-bottom: 1.5rem; color: #666;">寻味河北 · 地道风味 · 历史传承</p>
            <div id="foodPageContent"></div>
        </div>
    </div>

    <div id="planPage" class="page">
        <div class="page-card">
            <h2>🗺️ 智能旅游线路规划</h2>
            <div class="preset-buttons">
                <button class="preset-btn" data-preset="heritage">🏯 世界遗产之旅</button>
                <button class="preset-btn" data-preset="coast">🌊 海滨休闲之旅</button>
                <button class="preset-btn" data-preset="mountain">⛰️ 太行山水之旅</button>
                <button class="preset-btn" data-preset="clear">🗑️ 清空选择</button>
            </div>
            <div class="attractions-checkbox" id="attractionsCheckbox"></div>
            <div class="calc-result" id="calcResult"></div>
            <button class="route-btn" id="generateRouteBtn">🚗 生成高德线路规划</button>
        </div>
    </div>

    <div id="hotelPage" class="page">
        <div class="page-card">
            <h2>🏨 精选住宿推荐</h2>
            <p style="margin-bottom: 1rem; color: #666;">点击卡片可直接在高德地图中搜索宾馆位置</p>
            <div class="hotel-grid" id="hotelGrid"></div>
        </div>
    </div>

    <div id="detailContainer"></div>

    <div id="loginPage" class="page">
        <div class="login-container">
            <h2>欢迎登录</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名/手机号" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="login-btn">登录</button>
                <div class="register-link">还没有账号？<a href="#" id="registerLink">立即注册</a></div>
            </form>
        </div>
    </div>
</div>

<footer><p>&copy; 2026 河北文旅 | 数据来源：河北省文旅厅 & 游客调研报告</p></footer>

<script>
    const CACHE_VERSION = '20260325-2';

    function withVersion(url) {
        if (!url) return '';
        return url.includes('?') ? `${url}&v=${CACHE_VERSION}` : `${url}?v=${CACHE_VERSION}`;
    }

    function escapeAttr(str) {
        return String(str ?? '')
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function fallbackAttr(fallbackUrl) {
        const safeFallback = escapeAttr(withVersion(fallbackUrl));
        return `this.onerror=null;this.src='${safeFallback}'`;
    }

    const attractions = [
        { id: 'chengde', name: '承德避暑山庄', hot: 98.7, traffic: '3.2万人次/日', duration: 5, price: 130,
          img: 'https://www.bishushanzhuang.com.cn/Upload/album/0F85DEB9BB65F24912F99B1EA768BA0E.jpg', detailImg: 'https://www.bishushanzhuang.com.cn/Upload/album/0339DF0C17CFFD4987E804ADD6DD461F.jpg', extraImages: ['https://www.bishushanzhuang.com.cn/Upload/album/F367E336CA4832EC0094F70AEE719F8C.jpg','https://www.bishushanzhuang.com.cn/Upload/album/450DC36E83EE0E5F96490FDE28D32A02.jpg','https://www.bishushanzhuang.com.cn/Upload/album/0D89F58B2BB520FF9F2FA354D054BE25.jpg'],
          description: '承德避暑山庄是世界文化遗产，国家5A级景区，清代皇帝夏季避暑和处理政务的场所，是中国现存最大的古典皇家园林。',
          details: '山庄始建于1703年，历经康熙、雍正、乾隆三朝，耗时89年建成。分为宫殿区、湖泊区、平原区、山峦区四大部分，集南北园林艺术之大成。',
          hours: '旺季(4-10月)：07:30-18:00<br>淡季(11-3月)：08:30-17:00', priceText: '旺季：130元/人<br>淡季：90元/人', durationText: '4-6小时',

    function renderPlanCheckbox() {
        const container = document.getElementById('attractionsCheckbox');
        container.innerHTML = attractions.map(attr => `
            <label>
                <input type="checkbox" value="${attr.id}">
                <span>${attr.name} (时长:${attr.duration}h, 门票:¥${attr.price})</span>
            </label>
        `).join('');
        container.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.addEventListener('change', updatePlanning));
        updatePlanning();
    }

    function updatePlanning() {
        const selected = [];
        document.querySelectorAll('#attractionsCheckbox input:checked').forEach(cb => {
            const attr = attractions.find(a => a.id === cb.value);
            if (attr) selected.push(attr);
        });
        const totalTime = selected.reduce((sum, a) => sum + a.duration, 0);
        const totalPrice = selected.reduce((sum, a) => sum + a.price, 0);
        document.getElementById('calcResult').innerHTML = `
            <p>✅ 已选择 ${selected.length} 个景点</p>
            <p>⏱️ 预计总游玩时间：${totalTime} 小时</p>
            <p>💰 预计门票总费用：¥${totalPrice}</p>
        `;
    }

    function presetRoute(type) {
        document.querySelectorAll('#attractionsCheckbox input').forEach(cb => cb.checked = false);
        let ids = [];
        if (type === 'heritage') ids = ['chengde', 'shanhai', 'qingdong'];
        else if (type === 'coast') ids = ['shanhai', 'beidaihe', 'baiyang'];
        else if (type === 'mountain') ids = ['yesanpo', 'wahuang', 'xibaipo'];
        ids.forEach(id => {
            const cb = document.querySelector(`#attractionsCheckbox input[value="${id}"]`);
            if (cb) cb.checked = true;
        });
        updatePlanning();
    }

    function generateAmapRoute() {
        const selected = [];
        document.querySelectorAll('#attractionsCheckbox input:checked').forEach(cb => {
            const attr = attractions.find(a => a.id === cb.value);
            if (attr) selected.push(attr);
        });
        if (selected.length === 0) {
            alert('请先勾选要游览的景点');
            return;
        }
        const keywords = selected.map(a => a.name).join(' ');
        const amapUrl = `https://uri.amap.com/search?keyword=${encodeURIComponent(keywords)}&callnative=1`;
        window.open(amapUrl, '_blank');
    }

    function initCollapsible() {

        let collapsed = false;
        toggleBtn.addEventListener('click', () => {
            collapsed = !collapsed;

            icon.textContent = collapsed ? '▶' : '▼';
        });

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const target = document.getElementById(pageId + 'Page');
        if (target) target.classList.add('active');
        else document.getElementById('homePage').classList.add('active');
        window.scrollTo(0, 0);
    }

    function showPageWithHash(pageId) {
        if (window.location.hash.slice(1) !== pageId) {
            window.location.hash = pageId;
        }
        showPage(pageId);
    }

    function handleHash() {
        const hash = window.location.hash.slice(1);
        const validPages = ['home', 'food', 'plan', 'hotel', 'login', ...attractions.map(a => a.id)];
        if (hash && validPages.includes(hash)) showPage(hash);
        else showPage('home');
    }

    function bindDataPage() {
        document.querySelectorAll('[data-page]').forEach(el => {
            el.addEventListener('click', () => showPageWithHash(el.dataset.page));
        });
    }

        const heroVideo = document.getElementById('heroVideo');
        const heroVideoSource = document.getElementById('heroVideoSource');
        const videoPlayMask = document.getElementById('videoPlayMask');

        if (!heroVideo || !heroVideoSource) return;

        heroVideoSource.setAttribute('src', withVersion('https://video.699pic.com/videos/ll/vt/hj/llvTHjFv6kLXD23debW4OyWZwJxa_10s.mp4'));

        const poster = heroVideo.getAttribute('poster');
        if (poster) heroVideo.poster = withVersion(poster);

        heroVideo.load();

        const hideMask = () => videoPlayMask && videoPlayMask.classList.add('hidden');
        const showMask = () => videoPlayMask && videoPlayMask.classList.remove('hidden');

        const tryPlay = async (unmute = false) => {
            try {
                heroVideo.muted = !unmute;
                await heroVideo.play();
                hideMask();
            } catch (err) {
                showMask();
                console.log('视频播放失败：', err);
            }
        };

        tryPlay(false);

        const firstTouchPlay = async () => {
            await tryPlay(false);
            document.removeEventListener('touchstart', firstTouchPlay);
            document.removeEventListener('click', firstTouchPlay);
        };

        document.addEventListener('touchstart', firstTouchPlay, { passive: true });
        document.addEventListener('click', firstTouchPlay, { passive: true });

        if (videoPlayMask) {
            videoPlayMask.addEventListener('click', async () => {
                await tryPlay(true);
            });
        }

        heroVideo.addEventListener('playing', hideMask);
        heroVideo.addEventListener('pause', showMask);
        heroVideo.addEventListener('error', showMask);
    }

    function init() {
        renderRanking();
        renderDropdown();
        renderFeatured();
        renderFoodPage();
        renderPlanCheckbox();
        renderHotelPage();
        generateDetailPages();
        initCollapsible();
        bindDataPage();
        initLogin();
        initHeroMedia();

        document.getElementById('generateRouteBtn').addEventListener('click', generateAmapRoute);
        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => presetRoute(btn.dataset.preset));
        });

        window.addEventListener('hashchange', handleHash);
        handleHash();
    }

    init();
</script>
</body>
</html>
